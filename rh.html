<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recursos Humanos — Portal Marques &amp; Abreu</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div id="topbar" class="topbar"></div>

<div class="page-wrap">

<h1>Recursos Humanos</h1>
<p class="subtitle">Registo de funcionários — alimenta os campos de Angariador, Vendedor e Direção Comercial em Gestão Comercial</p>

<div class="card" id="form-card">
  <h2 id="form-title">Adicionar Funcionário</h2>
  <form id="func-form">
    <input type="hidden" id="f-id">
    <div class="field field-full">
      <label>Nome</label>
      <input type="text" id="f-nome" placeholder="Nome completo" required>
    </div>
    <div class="field">
      <label>Nº BI</label>
      <input type="text" id="f-bi" placeholder="Ex: 123456789LA042">
    </div>
    <div class="field">
      <label>Data de Nascimento</label>
      <input type="date" id="f-data-nascimento">
    </div>
    <div class="field">
      <label>Idade</label>
      <input type="text" id="f-idade" disabled placeholder="—">
    </div>
    <div class="field">
      <label>Data de Contratação</label>
      <input type="date" id="f-data-contratacao">
    </div>
    <div class="field">
      <label>Tipo de Contrato</label>
      <select id="f-tipo-contrato">
        <option value="">—</option>
        <option>Efetivo</option>
        <option>Termo Certo</option>
        <option>Termo Incerto</option>
        <option>Prestação de Serviços</option>
        <option>Estágio</option>
      </select>
    </div>
    <div class="field">
      <label>Cargo</label>
      <select id="f-cargo">
        <option value="Comercial">Comercial</option>
        <option value="Diretor Comercial">Diretor Comercial</option>
      </select>
    </div>
    <div class="field">
      <label>Estado</label>
      <select id="f-ativo">
        <option value="true">Ativo</option>
        <option value="false">Inativo</option>
      </select>
    </div>
    <div class="actions-row">
      <button type="submit" id="btn-save">Adicionar Funcionário</button>
      <button type="button" class="secondary" id="btn-cancel" style="display:none">Cancelar Edição</button>
    </div>
  </form>
</div>

<div class="card">
  <h2>Funcionários</h2>
  <div class="scroll-x">
    <table>
      <thead>
        <tr>
          <th>Nome</th><th>Nº BI</th><th>Data Nascimento</th><th>Idade</th>
          <th>Data Contratação</th><th>Tipo Contrato</th><th>Cargo</th><th>Estado</th><th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbl-funcionarios"></tbody>
    </table>
  </div>
  <div id="funcionarios-empty" class="empty" style="display:none">Ainda não há funcionários registados.</div>
</div>

</div><!-- /page-wrap -->

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button type="button" class="secondary" id="modal-cancel">Cancelar</button>
      <button type="button" id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script src="assets/supabase-client.js"></script>
<script>
let funcionarios = [];
let editingId = null;
let canEdit = false;

function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(d){
  if(!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function calcIdade(dataNascimento){
  if(!dataNascimento) return null;
  const nasc = new Date(dataNascimento + 'T00:00:00');
  if(isNaN(nasc.getTime())) return null;
  const hoje = new Date();
  let idade = hoje.getFullYear() - nasc.getFullYear();
  const aindaNaoFezAnos = (hoje.getMonth() < nasc.getMonth()) ||
    (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate());
  if(aindaNaoFezAnos) idade--;
  return idade;
}
function eur(v){
  return (v||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2});
}
function comissaoAgencia(d){ return (d.preco||0) * (d.comissao_pct||0) / 100; }
function valorAngariador(d){ return comissaoAgencia(d) * (d.angariador_pct||0) / 100; }
function valorVendedor(d){ return comissaoAgencia(d) * (d.vendedor_pct||0) / 100; }
function valorDcAngariador(d){ return comissaoAgencia(d) * (d.dc_angariador_pct||0) / 100; }
function valorDcVendedor(d){ return comissaoAgencia(d) * (d.dc_vendedor_pct||0) / 100; }

// ---------- Modal ----------
let modalConfirmCb = null;
function openModal(title, bodyHtml, onConfirm, confirmText, showCancel, wide){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-confirm').textContent = confirmText || 'Confirmar';
  document.getElementById('modal-cancel').style.display = (showCancel===false) ? 'none' : 'inline-block';
  modalConfirmCb = onConfirm;
  document.querySelector('#modal-overlay .modal-box').classList.toggle('modal-wide', !!wide);
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
  modalConfirmCb = null;
}
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target.id==='modal-overlay') closeModal();
});
document.getElementById('modal-confirm').addEventListener('click', ()=>{
  const cb = modalConfirmCb;
  closeModal();
  if(cb) cb();
});

// ---------- Idade automática ----------
document.getElementById('f-data-nascimento').addEventListener('change', ()=>{
  const idade = calcIdade(document.getElementById('f-data-nascimento').value);
  document.getElementById('f-idade').value = (idade==null) ? '' : (idade + ' anos');
});

// ---------- Carregar dados ----------
async function loadAll(){
  const { data, error } = await supabaseClient.from('funcionarios').select('*').order('nome');
  funcionarios = data || [];
}

// ---------- Form ----------
const form = document.getElementById('func-form');
form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const payload = {
    nome: document.getElementById('f-nome').value.trim(),
    bi: document.getElementById('f-bi').value.trim() || null,
    data_nascimento: document.getElementById('f-data-nascimento').value || null,
    data_contratacao: document.getElementById('f-data-contratacao').value || null,
    tipo_contrato: document.getElementById('f-tipo-contrato').value || null,
    cargo: document.getElementById('f-cargo').value,
    ativo: document.getElementById('f-ativo').value === 'true'
  };

  if(editingId){
    await supabaseClient.from('funcionarios').update(payload).eq('id', editingId);
  } else {
    await supabaseClient.from('funcionarios').insert(payload);
  }
  await loadAll();
  resetForm();
  renderFuncionarios();
});

document.getElementById('btn-cancel').addEventListener('click', resetForm);

function resetForm(){
  editingId = null;
  form.reset();
  document.getElementById('f-id').value='';
  document.getElementById('f-idade').value='';
  document.getElementById('f-cargo').value='Comercial';
  document.getElementById('f-ativo').value='true';
  document.getElementById('form-title').textContent='Adicionar Funcionário';
  document.getElementById('btn-save').textContent='Adicionar Funcionário';
  document.getElementById('btn-cancel').style.display='none';
}

function editFuncionario(id){
  const f = funcionarios.find(x=>x.id===id);
  if(!f) return;
  editingId = id;
  document.getElementById('f-nome').value = f.nome || '';
  document.getElementById('f-bi').value = f.bi || '';
  document.getElementById('f-data-nascimento').value = f.data_nascimento || '';
  const idade = calcIdade(f.data_nascimento);
  document.getElementById('f-idade').value = (idade==null) ? '' : (idade + ' anos');
  document.getElementById('f-data-contratacao').value = f.data_contratacao || '';
  document.getElementById('f-tipo-contrato').value = f.tipo_contrato || '';
  document.getElementById('f-cargo').value = f.cargo || 'Comercial';
  document.getElementById('f-ativo').value = f.ativo ? 'true' : 'false';
  document.getElementById('form-title').textContent='Editar Funcionário';
  document.getElementById('btn-save').textContent='Guardar Alterações';
  document.getElementById('btn-cancel').style.display='inline-block';
  window.scrollTo({top:0, behavior:'smooth'});
}

function deleteFuncionario(id){
  const f = funcionarios.find(x=>x.id===id); if(!f) return;
  openModal('Eliminar Funcionário',
    `<p>Tens a certeza que queres eliminar <b>${esc(f.nome)}</b>?</p>
     <p class="note">Negócios já registados que referenciem este funcionário deixarão de mostrar o nome (mas mantêm os valores e percentagens de comissão).</p>`,
    async ()=>{
      await supabaseClient.from('funcionarios').delete().eq('id', id);
      await loadAll();
      renderFuncionarios();
    }, 'Eliminar');
}

// ---------- Negócios e ganhos do funcionário ----------
async function verNegociosFuncionario(id){
  const f = funcionarios.find(x=>x.id===id);
  if(!f) return;

  const { data, error } = await supabaseClient
    .from('negocios')
    .select('*')
    .or(`angariador_id.eq.${id},vendedor_id.eq.${id},dc_angariador_id.eq.${id},dc_vendedor_id.eq.${id}`)
    .order('created_at', { ascending:false });

  const negocios = data || [];
  let bodyHtml;

  if(error){
    bodyHtml = '<p class="empty">Não foi possível carregar os negócios deste funcionário.</p>';
  } else if(negocios.length===0){
    bodyHtml = '<p class="empty">Este funcionário ainda não está associado a nenhum negócio.</p>';
  } else {
    let nAngariados=0, nVendidos=0;
    let ganhoAng=0, ganhoVend=0, ganhoDcAng=0, ganhoDcVend=0;

    negocios.forEach(d=>{
      if(d.angariador_id===id) nAngariados++;
      if(d.vendedor_id===id && d.status==='Vendido') nVendidos++;
      if(d.status==='Vendido'){
        if(d.angariador_id===id) ganhoAng += valorAngariador(d);
        if(d.vendedor_id===id) ganhoVend += valorVendedor(d);
        if(d.dc_angariador_id===id) ganhoDcAng += valorDcAngariador(d);
        if(d.dc_vendedor_id===id) ganhoDcVend += valorDcVendedor(d);
      }
    });
    const ganhoTotal = ganhoAng + ganhoVend + ganhoDcAng + ganhoDcVend;

    const resumoHtml = `<div class="detail-section">
      <h4>Resumo de Ganhos (desde sempre)</h4>
      <div class="detail-grid">
        <div class="detail-item"><span class="detail-label">Imóveis Angariados</span><span class="detail-value">${nAngariados}</span></div>
        <div class="detail-item"><span class="detail-label">Imóveis Vendidos</span><span class="detail-value">${nVendidos}</span></div>
        <div class="detail-item"><span class="detail-label">Ganhos como Angariador</span><span class="detail-value">${eur(ganhoAng)}</span></div>
        <div class="detail-item"><span class="detail-label">Ganhos como Vendedor</span><span class="detail-value">${eur(ganhoVend)}</span></div>
        <div class="detail-item"><span class="detail-label">Ganhos como DC (Angariação)</span><span class="detail-value">${eur(ganhoDcAng)}</span></div>
        <div class="detail-item"><span class="detail-label">Ganhos como DC (Venda)</span><span class="detail-value">${eur(ganhoDcVend)}</span></div>
        <div class="detail-item"><span class="detail-label">Total de Ganhos</span><span class="detail-value"><b>${eur(ganhoTotal)}</b></span></div>
      </div>
    </div>`;

    const tabelaHtml = `<div class="detail-section"><h4>Negócios</h4><div class="scroll-x"><table>
      <thead><tr><th>Imóvel</th><th>Papel(éis)</th><th>Estado</th><th>Preço</th><th>Valor Recebido</th><th>Data</th></tr></thead>
      <tbody>${negocios.map(d=>{
        const papeis = [];
        if(d.angariador_id===id) papeis.push('Angariador');
        if(d.vendedor_id===id) papeis.push('Vendedor');
        if(d.dc_angariador_id===id) papeis.push('DC Angariação');
        if(d.dc_vendedor_id===id) papeis.push('DC Venda');

        let valor = 0;
        if(d.status==='Vendido'){
          if(d.angariador_id===id) valor += valorAngariador(d);
          if(d.vendedor_id===id) valor += valorVendedor(d);
          if(d.dc_angariador_id===id) valor += valorDcAngariador(d);
          if(d.dc_vendedor_id===id) valor += valorDcVendedor(d);
        }

        const dataRef = d.data_venda || d.data_angariacao || d.created_at;
        const dataFmt = dataRef ? formatDate(String(dataRef).slice(0,10)) : '—';

        return `<tr>
          <td>${d.tipologia ? esc(d.tipologia)+' - ' : ''}${esc(d.morada || '—')}</td>
          <td>${papeis.join(', ') || '—'}</td>
          <td><span class="badge badge-${String(d.status||'').replace(/ /g,'')}">${esc(d.status || '—')}</span></td>
          <td class="num">${eur(d.preco)}</td>
          <td class="num">${eur(valor)}</td>
          <td>${dataFmt}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;

    bodyHtml = resumoHtml + tabelaHtml;
  }

  openModal(`Negócios de ${esc(f.nome)}`, bodyHtml, null, 'Fechar', false, true);
}

// ---------- Tabela ----------
function renderFuncionarios(){
  const tbody = document.getElementById('tbl-funcionarios');
  const empty = document.getElementById('funcionarios-empty');
  if(funcionarios.length===0){
    tbody.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  tbody.innerHTML = funcionarios.map(f=>{
    const idade = calcIdade(f.data_nascimento);
    const acoesCell = canEdit
      ? `<button type="button" class="small secondary" onclick="editFuncionario('${f.id}')">Editar</button>
         <button type="button" class="small danger" onclick="deleteFuncionario('${f.id}')">Eliminar</button>`
      : '—';
    return `<tr>
      <td><a href="#" onclick="verNegociosFuncionario('${f.id}');return false;">${esc(f.nome)}</a></td>
      <td>${esc(f.bi || '—')}</td>
      <td>${formatDate(f.data_nascimento)}</td>
      <td class="num">${idade==null ? '—' : idade + ' anos'}</td>
      <td>${formatDate(f.data_contratacao)}</td>
      <td>${esc(f.tipo_contrato || '—')}</td>
      <td>${esc(f.cargo)}</td>
      <td>${f.ativo ? '<span class="badge badge-Vendido">Ativo</span>' : '<span class="badge badge-Perdido">Inativo</span>'}</td>
      <td>${acoesCell}</td>
    </tr>`;
  }).join('');
}

// ---------- Init ----------
(async ()=>{
  const auth = await requireAuth();
  if(!auth) return;
  renderTopbar('rh', auth.profile);
  canEdit = true; // Gestor e SuperAdmin têm sempre acesso total de edição

  if(!canEdit){
    document.getElementById('form-card').style.display = 'none';
  }

  await loadAll();
  renderFuncionarios();
})();
</script>
</body>
</html>
