<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal Marques &amp; Abreu</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div id="topbar" class="topbar"></div>

<div class="page-wrap">
  <h1>Portal</h1>
  <p class="subtitle">Marques &amp; Abreu — escolhe um módulo</p>

  <div class="module-grid" id="module-grid"></div>

  <div class="card" id="aniversarios-card" style="display:none">
    <h2>🎂 Aniversários a Chegar</h2>
    <div id="aniversarios-list"></div>
  </div>
</div>

<script src="assets/supabase-client.js"></script>
<script>
(async ()=>{
  const auth = await requireAuth();
  if(!auth) return;
  const { profile } = auth;

  renderTopbar('home', profile);

  const modules = [
    {
      icon:'📊', title:'Gestão Comercial', href:'comercial.html',
      desc:'Negócios, comissões e dashboards da atividade comercial.'
    },
    {
      icon:'👥', title:'Recursos Humanos', href:'rh.html',
      desc:'Registo de funcionários: dados pessoais, contratos e cargos.'
    },
    {
      icon:'🤝', title:'Clientes', href:'clientes.html',
      desc:'Registo de clientes e histórico de negócios (vendas, compras e oportunidades perdidas).'
    }
  ];

  if(profile.role === 'admin' || profile.role === 'editor'){
    modules.push({
      icon:'🔐', title:'Utilizadores e Permissões', href:'utilizadores.html',
      desc:'Gestão de contas, acessos e permissões do portal.', tag:'Admin'
    });
  }

  document.getElementById('module-grid').innerHTML = modules.map(m=>`
    <a class="module-card" href="${m.href}">
      ${m.tag ? `<span class="tag">${m.tag}</span>` : ''}
      <span class="module-icon">${m.icon}</span>
      <h2>${m.title}</h2>
      <p>${m.desc}</p>
    </a>
  `).join('');

  // ---------- Aviso de aniversários ----------
  const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const { data: funcionarios } = await supabaseClient.from('funcionarios').select('nome, data_nascimento').eq('ativo', true);
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  const proximos = (funcionarios || []).map(f=>{
    if(!f.data_nascimento) return null;
    const nasc = new Date(f.data_nascimento + 'T00:00:00');
    if(isNaN(nasc.getTime())) return null;
    let prox = new Date(hoje.getFullYear(), nasc.getMonth(), nasc.getDate());
    if(prox < hoje) prox = new Date(hoje.getFullYear()+1, nasc.getMonth(), nasc.getDate());
    const dias = Math.round((prox - hoje) / 86400000);
    return { nome: f.nome, dias, data: nasc };
  }).filter(x => x && x.dias >= 0 && x.dias <= 7)
    .sort((a,b)=>a.dias-b.dias);

  if(proximos.length){
    document.getElementById('aniversarios-card').style.display = 'block';
    document.getElementById('aniversarios-list').innerHTML = proximos.map(p=>{
      const dataFmt = `${String(p.data.getDate()).padStart(2,'0')}/${String(p.data.getMonth()+1).padStart(2,'0')}`;
      let quando;
      if(p.dias===0) quando = 'é hoje! 🎉';
      else if(p.dias===1) quando = 'é amanhã';
      else quando = `faltam ${p.dias} dias`;
      return `<div class="visit-row">🎂 <b>${esc(p.nome)}</b> — aniversário a ${dataFmt} (${quando})</div>`;
    }).join('');
  }
})();
</script>
</body>
</html>
