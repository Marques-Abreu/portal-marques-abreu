<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conta Pendente — Portal Marques &amp; Abreu</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>

<div class="login-wrap">
  <div class="login-box" style="text-align:center">
    <h1>Marques &amp; Abreu</h1>
    <p class="subtitle">Portal do Colaborador</p>

    <div class="login-success" style="display:block">
      A tua conta foi criada com sucesso e está <b>pendente de aprovação</b>.<br><br>
      Um <b>SuperAdmin</b> ou <b>Gestor</b> tem de aprovar a tua conta e atribuir-te uma permissão de acesso
      (SuperAdmin ou Gestor) antes que possas utilizar o portal.<br><br>
      Tenta novamente mais tarde.
    </div>

    <button id="btn-logout" type="button" style="width:100%;margin-top:6px">Sair</button>
  </div>
</div>

<script src="assets/supabase-client.js"></script>
<script>
(async ()=>{
  const auth = await requireAuth({ allowPending: true });
  if(!auth) return;
  document.getElementById('btn-logout').addEventListener('click', signOut);
})();
</script>
</body>
</html>
